<html>
<head>
    <head>
    <title>Flex Row Example</title>
    </head>
    <style>
        .container {
            display: flex;
            gap: 10px;
        }
.box {
            width: 100px;
            height: 100px;
            background-color: lightblue;
            text-align: center;
            line-height: 100px;
            border: 2px solid black;
        }
    </style>
</head>
<body>

    <h2>Flex Row Layout</h2>

    <div class="container">
        <div class="box">Box 1</div>
        <div class="box">Box 2</div>
        <div class="box">Box 3</div>
    </div>

</body>
</html>
