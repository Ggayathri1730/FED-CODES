<!DOCTYPE html>
<html>
<head>
    <title>Online FoodShop</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 10px;
        }

        .header h1 {
            color: red;
            margin: 0;
        }

        .header p {
            margin: 0;
            font-size: 14px;
        }

        /* Navbar */
        .navbar {
            background-color: gray;
            text-align: center;
            padding: 12px;
            border-radius: 10px;
            margin: 0 10px;
        }

        .navbar a {
            color: white;
            margin: 0 20px;
            text-decoration: none;
            font-weight: bold;
        }

        /* Main Section */
        .main {
            background-image: url("foodshop.png"); /* YOUR IMAGE */
            background-size: cover;
            background-position: center;
            height: 350px;
            text-align: center;
            padding-top: 60px;
        }

        .main h2 {
            font-size: 28px;
        }

        .main button {
            padding: 10px 25px;
            background-color: yellow;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }

        /* Featured Products */
        .footer {
            text-align: center;
            color: red;
            font-weight: bold;
            padding: 15px;
            border-top: 1px solid black;
        }
    </style>

</head>
<body>

    <!-- Header -->
    <div class="header">
        <h1>Online</h1>
        <p>FoodShop</p>
    </div>

    <!-- Navigation -->
    <div class="navbar">
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Menu</a>
        <a href="#">ContactUs</a>
    </div>

    <!-- Image Section -->
    <div class="main">
        <h2>Welcome to Online FoodShop</h2>
        <button>ORDER NOW</button>
    </div>

    <!-- Footer -->
    <div class="footer">
        Featured Products
    </div>

</body>
</html>
